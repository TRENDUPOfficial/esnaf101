# Render Blueprint — https://render.com/docs/blueprint-spec
#
# NOT: Bu dosya gerçek bir Render hesabına karşı test edilmedi (bu ortamda
# Render erişimi yok) — Render'ın "New > Blueprint" akışı repo'yu bağladığında
# söz dizimini kendi tarafında doğrular/gösterir, ilk denemede küçük
# düzeltmeler gerekebilir. PLANNING.md'deki "Barındırma" kararına göre
# Railway/Render arasından Render seçildi (render.yaml ile tekrarlanabilir,
# tek dosyadan kurulum sağlıyor); Railway tercih edilirse bu dosya railway'in
# kendi formatına (Nixpacks/Dockerfile servisleri) çevrilmeli.
#
# Kurulum: Render Dashboard > New > Blueprint > bu repo'yu seç. Render bu
# dosyayı okuyup aşağıdaki tüm servisleri otomatik oluşturur. "sync: false"
# işaretli env değişkenlerini Render Dashboard'dan elle girmen gerekir
# (gerçek Clerk/WhatsApp/Paraşüt/Shipentegra/iyzico kimlik bilgileri —
# hiçbiri bu repoda/dosyada yok).
#
# İLK DENEME (ücretsiz katman): apps/worker (BullMQ arka plan işçisi) Render'da
# ücretsiz planı desteklemiyor (sadece web servisleri, Postgres ve Key Value
# için ücretsiz plan var) — bu yüzden şimdilik bu dosyadan çıkarıldı. Onsuz
# panel, giriş, ürün/müşteri/sipariş CRUD'u çalışır; sadece kuyruğa atılan
# işler (fatura oluşturma, kargo oluşturma, WhatsApp mesaj gönderimi) işlenmez.
# Kart eklenip gerçek arka plan işleme istendiğinde apps/worker'ı starter (veya
# üzeri) planla geri eklemek yeterli — bkz. commit geçmişinde eski hali.

databases:
  - name: esnaf101-db
    databaseName: esnaf101
    user: esnaf101
    plan: free

services:
  - type: redis
    name: esnaf101-redis
    plan: free
    ipAllowList: [] # boş = yalnızca bu Render hesabındaki servislere açık

  - type: web
    name: esnaf101-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: esnaf101-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: esnaf101-redis
          property: connectionString
      - key: APP_ENCRYPTION_KEY
        generateValue: true
      - key: PLATFORM_ADMIN_JWT_SECRET
        generateValue: true
      # app.esnaf101.com,admin.esnaf101.com gibi virgülle ayrılmış liste —
      # bkz. apps/api/src/main.ts resolveAllowedOrigins().
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_BASE_URL
        value: https://sandbox-api.iyzipay.com
      # Tanımsız bırakılırsa ObjectStorage yerel diske düşer (bkz.
      # @esnaf101/integrations-storage) — ücretsiz web servisinin diski kalıcı
      # olmadığından (her redeploy'da silinir) gerçek kullanım için mutlaka
      # bir R2/S3 bucket'ı girilmeli.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false

  - type: web
    name: esnaf101-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      # NEXT_PUBLIC_* build-time'da bundle'a gömülür (bkz. apps/web/Dockerfile
      # ARG'ları) — Render Docker servislerinde env var'lar otomatik build
      # arg olarak da geçirilir.
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      # api servisinin gerçek (custom domain bağlandıktan sonraki) URL'si.
      - key: NEXT_PUBLIC_API_URL
        sync: false

  - type: web
    name: esnaf101-superadmin
    runtime: docker
    dockerfilePath: ./apps/superadmin/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
